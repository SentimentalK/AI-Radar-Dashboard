name: Publish Multi-Arch Containers

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build ${{ matrix.service }} (${{ matrix.platforms }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Static Vite output — BUILDPLATFORM in Dockerfile.web makes multi-arch cheap.
          - service: web
            dockerfile: Dockerfile.web
            runner: ubuntu-latest
            platforms: linux/amd64,linux/arm64

          # better-sqlite3 needs a native compile; QEMU arm64 hangs/crashes on npm ci.
          # mtl0 is arm64, so build the API natively on GitHub's ARM runner.
          - service: api
            dockerfile: Dockerfile.api
            runner: ubuntu-24.04-arm
            platforms: linux/arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve lowercase image name
        id: image
        shell: bash
        run: |
          repository_lc="${GITHUB_REPOSITORY,,}"
          echo "name=${REGISTRY}/${repository_lc}-${{ matrix.service }}" \
            >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: matrix.service == 'web'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}

          flavor: |
            latest=false

          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

          labels: |
            org.opencontainers.image.title=AI Radar Dashboard ${{ matrix.service }}
            org.opencontainers.image.description=AI Radar Dashboard ${{ matrix.service }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope must not contain commas — platforms like "linux/amd64,linux/arm64"
          # would be parsed as extra buildx options and fail with "invalid value linux/arm64".
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
